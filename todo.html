<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #4ade80;
      --high: #f87171;
      --medium: #fb923c;
      --low: #60a5fa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    #app {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    nav { display: flex; gap: 4px; }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.15s;
    }

    .nav-btn.active, .nav-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--accent);
    }
    
    .nav-btn.special {
      color: var(--medium);
      border-color: var(--border);
    }
    
    .nav-btn.special:hover {
      border-color: var(--medium);
    }

    .hidden { display: none !important; }

    #pause-banner {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--high);
      color: var(--high);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      font-weight: 600;
      animation: fadeIn 0.3s ease-in-out;
    }

    #pause-banner span {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input:focus { border-color: var(--accent); }

    .add-row select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 10px;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      outline: none;
    }

    .add-row button {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .add-row button:hover { opacity: 0.85; }

    .task-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .task-row.active { border-color: var(--accent); }

    .task-row.completed .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-dot.priority-high   { background: var(--high); }
    .priority-dot.priority-medium { background: var(--medium); }
    .priority-dot.priority-low    { background: var(--low); }

    .task-check {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.9rem;
      word-break: break-word;
    }

    .task-timer {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      min-width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    .task-timer.running { color: var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .task-timer.running::before {
      content: '● ';
      animation: pulse 1.2s ease-in-out infinite;
    }

    .timer-btn, .delete-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .timer-btn:hover { color: var(--accent); border-color: var(--accent); }
    .delete-btn:hover { color: var(--high); border-color: var(--high); }

    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.15s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--accent);
    }

    #history-table table {
      width: 100%;
      border-collapse: collapse;
    }

    #history-table th, #history-table td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    #history-table th {
      color: var(--muted);
      font-weight: 500;
    }

    #history-table tfoot td {
      font-weight: 600;
      color: var(--accent);
      border-top: 1px solid var(--border);
      border-bottom: none;
    }
    
    .pause-row {
      color: var(--high);
      font-style: italic;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.875rem;
      text-align: center;
      padding: 40px 0;
    }

    .fill-bar {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 0%;
      pointer-events: none;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fill-bar.filling  { background: rgba(74, 222, 128, 0.12); }
    .fill-bar.complete { background: rgba(74, 222, 128, 0.28); }

    .target-badge {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid currentColor;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .target-badge.unmet { color: var(--medium); }
    .target-badge.met   { color: var(--accent); }
    .target-badge.add-target {
      color: var(--muted);
      border-color: var(--border);
      opacity: 0;
    }
    .task-row:hover .target-badge.add-target { opacity: 1; }

    .target-edit-input {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 2px 6px;
      border-radius: 4px;
      width: 70px;
      outline: none;
      flex-shrink: 0;
    }

    #target-input:focus { border-color: var(--accent) !important; }
    #label-input:focus { border-color: var(--low) !important; }

    .label-badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--low);
      background: none;
      color: var(--low);
      cursor: pointer;
      flex-shrink: 0;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .label-badge.add-label {
      color: var(--muted);
      border-color: var(--border);
      opacity: 0;
    }
    .task-row:hover .label-badge.add-label { opacity: 1; }

    .label-edit-input {
      font-size: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--low);
      color: var(--text);
      padding: 2px 8px;
      border-radius: 10px;
      width: 90px;
      outline: none;
      flex-shrink: 0;
    }

    .label-group-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      margin: 12px 0 8px;
      width: 100%;
      text-align: left;
      transition: all 0.15s;
    }
    .label-group-toggle:hover { color: var(--text); border-color: var(--low); }

    .task-row[draggable="true"] { cursor: grab; }
    .task-row[draggable="true"]:active { cursor: grabbing; }
    .task-row.dragging { opacity: 0.4; }
    .task-row.drag-over { border-color: var(--accent); border-style: dashed; }

    .completed-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
      margin-bottom: 8px;
      width: 100%;
      text-align: left;
      transition: all 0.15s;
    }
    .completed-toggle:hover { color: var(--text); border-color: var(--accent); }

    /* Notes button on task row */
    .notes-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s; opacity: 0;
    }
    .task-row:hover .notes-btn { opacity: 1; }
    .notes-btn.has-notes { opacity: 1; color: var(--low); border-color: var(--low); }
    .notes-btn:hover { color: var(--low); border-color: var(--low); opacity: 1 !important; }

    /* Notes modal */
    #notes-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .notes-modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 480px;
      max-height: 80vh; display: flex; flex-direction: column;
    }
    .notes-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .notes-modal-title { font-size: 0.95rem; font-weight: 600; }
    .notes-modal-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; line-height: 1; padding: 4px; transition: color 0.15s;
    }
    .notes-modal-close:hover { color: var(--text); }
    .notes-list {
      flex: 1; overflow-y: auto; padding: 12px 20px;
      display: flex; flex-direction: column; gap: 8px; min-height: 80px;
    }
    .note-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 36px 10px 12px;
      position: relative;
    }
    .note-item-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
    .note-item-text { font-size: 0.875rem; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .note-item-delete {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.75rem; opacity: 0; transition: opacity 0.15s;
    }
    .note-item:hover .note-item-delete { opacity: 1; }
    .note-item-delete:hover { color: var(--high); }
    .note-audio audio { width: 100%; height: 30px; margin-top: 6px; }
    .note-shot { max-width: 100%; border-radius: 6px; margin-top: 6px; display: block; }
    .notes-add-area {
      padding: 12px 20px; border-top: 1px solid var(--border);
      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
    }
    #notes-pending-preview:empty { display: none; }
    .notes-pending-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; margin-bottom: 6px;
      font-size: 0.8rem; color: var(--muted);
    }
    .notes-pending-item img { max-height: 50px; border-radius: 4px; }
    .notes-pending-remove {
      margin-left: auto; background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.8rem; flex-shrink: 0;
    }
    .notes-pending-remove:hover { color: var(--high); }
    .notes-add-row { display: flex; gap: 8px; align-items: flex-end; }
    .notes-textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 8px;
      font-size: 0.875rem; font-family: inherit; resize: none;
      outline: none; min-height: 60px; transition: border-color 0.15s;
    }
    .notes-textarea:focus { border-color: var(--accent); }
    .notes-media-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
      font-size: 0.95rem; flex-shrink: 0; transition: all 0.15s;
    }
    .notes-media-btn:hover { color: var(--text); border-color: var(--accent); }
    .notes-media-btn.recording { color: var(--high); border-color: var(--high); animation: pulse 1.2s ease-in-out infinite; }
    .notes-save-btn {
      background: var(--accent); border: none; color: #000;
      padding: 8px 16px; border-radius: 8px; font-size: 0.875rem;
      font-weight: 600; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
      height: 36px;
    }
    .notes-save-btn:hover { opacity: 0.85; }

    /* Notes view */
    .notes-task-section {
      border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden;
    }
    .notes-task-toggle {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: var(--surface);
      cursor: pointer; width: 100%; text-align: left;
      font-size: 0.875rem; border: none; color: var(--text); transition: background 0.15s;
    }
    .notes-task-toggle:hover { background: #222; }
    .toggle-chevron { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
    .toggle-name { flex: 1; font-weight: 500; }
    .toggle-count { color: var(--muted); font-size: 0.8rem; }
    .notes-task-body {
      padding: 8px 16px 12px; display: flex; flex-direction: column;
      gap: 6px; border-top: 1px solid var(--border); background: var(--bg);
    }
    .notes-view-item { background: var(--surface); border-radius: 6px; padding: 8px 12px; }
    .notes-view-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
    .notes-view-text { font-size: 0.85rem; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .notes-view-item .note-audio audio { width: 100%; height: 30px; margin-top: 6px; }
    .notes-view-item .note-shot { max-width: 100%; border-radius: 6px; margin-top: 6px; display: block; }

    #total-target-bar {
      position: relative;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #total-target-bar .ttb-fill {
      position: absolute;
      left: 0; top: 0; height: 100%;
      width: 0%;
      background: rgba(74, 222, 128, 0.12);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    #total-target-bar.complete .ttb-fill { background: rgba(74, 222, 128, 0.28); }
    #total-target-bar .ttb-label {
      position: relative;
      z-index: 1;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>✓ TaskFlow</h1>
      <nav>
        <button id="pip-btn" class="nav-btn special">🔲 Pop-out</button>
        <button id="nav-tasks" class="nav-btn active">Tasks</button>
        <button id="nav-history" class="nav-btn">History</button>
        <button id="nav-notes" class="nav-btn">Notes</button>
      </nav>
    </header>

    <main>
      <div id="pause-banner" class="hidden">
        <div>⏸ Paused Focus Tracked</div>
        <span id="pause-timer">00:00:00</span>
      </div>

      <div id="view-tasks">
        <div class="add-row">
          <input type="text" id="task-input" placeholder="Add a task..." />
          <select id="priority-select">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
          <input type="text" id="target-input" placeholder="Target (30m, 1h…)" style="width:110px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 10px;border-radius:8px;font-size:0.875rem;outline:none;" />
          <input type="text" id="label-input" list="label-datalist" placeholder="Label (optional)" style="width:120px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 10px;border-radius:8px;font-size:0.875rem;outline:none;" />
          <datalist id="label-datalist"></datalist>
          <button id="add-btn">+ Add</button>
        </div>
        <div id="total-target-bar" class="hidden">
          <div class="ttb-fill"></div>
          <span class="ttb-label" id="ttb-label"></span>
        </div>
        <div id="task-list"></div>
        <div id="completed-section"></div>
      </div>

      <div id="view-history" class="hidden">
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="day">Day</button>
          <button class="filter-btn" data-filter="week">Week</button>
          <button class="filter-btn" data-filter="month">Month</button>
        </div>
        <div id="history-table"></div>
      </div>

      <div id="view-notes" class="hidden">
        <div id="notes-view-content"></div>
      </div>
    </main>
  </div>

  <!-- Notes modal -->
  <div id="notes-modal" class="hidden">
    <div class="notes-modal-box">
      <div class="notes-modal-header">
        <span class="notes-modal-title" id="notes-modal-title"></span>
        <button class="notes-modal-close" id="notes-modal-close">✕</button>
      </div>
      <div class="notes-list" id="notes-list"></div>
      <div class="notes-add-area">
        <div id="notes-pending-preview"></div>
        <div class="notes-add-row">
          <textarea class="notes-textarea" id="notes-textarea" placeholder="Add a note… (Ctrl+Enter to save)" rows="2"></textarea>
          <button class="notes-media-btn" id="notes-mic-btn" title="Record audio">🎤</button>
          <button class="notes-media-btn" id="notes-shot-btn" title="Capture screenshot">🖥</button>
          <button class="notes-save-btn" id="notes-save-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Storage ──────────────────────────────────────────────────────────────
    const Storage = (() => {
      const TASKS_KEY = 'tf_tasks';
      const SESSIONS_KEY = 'tf_sessions';
      const PAUSES_KEY = 'tf_pauses';
      const NOTES_KEY = 'tf_notes';

      function load() {
        return {
          tasks: JSON.parse(localStorage.getItem(TASKS_KEY) || '[]'),
          sessions: JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'),
          pauseSessions: JSON.parse(localStorage.getItem(PAUSES_KEY) || '[]'),
          activePause: JSON.parse(localStorage.getItem('tf_active_pause') || 'null'),
          lastActiveTaskId: localStorage.getItem('tf_last_task') || null,
          notes: JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'),
        };
      }

      function save(tasks, sessions, pauseSessions, activePause, lastActiveTaskId, notes) {
        localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
        localStorage.setItem(PAUSES_KEY, JSON.stringify(pauseSessions));
        localStorage.setItem('tf_active_pause', JSON.stringify(activePause));
        localStorage.setItem(NOTES_KEY, JSON.stringify(notes || []));
        if (lastActiveTaskId) {
          localStorage.setItem('tf_last_task', lastActiveTaskId);
        } else {
          localStorage.removeItem('tf_last_task');
        }
      }

      return { load, save };
    })();

    // ── Media Store (IndexedDB, for audio/screenshot blobs) ───────────────────
    const MediaStore = (() => {
      const DB_NAME = 'tf_media_db';
      const STORE = 'media';
      let dbPromise = null;

      function getDb() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => req.result.createObjectStore(STORE);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        return dbPromise;
      }

      async function put(id, blob) {
        const db = await getDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readwrite');
          tx.objectStore(STORE).put(blob, id);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }

      async function get(id) {
        const db = await getDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readonly');
          const req = tx.objectStore(STORE).get(id);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      async function remove(id) {
        const db = await getDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readwrite');
          tx.objectStore(STORE).delete(id);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }

      return { put, get, remove };
    })();

    // ── State + Helpers ───────────────────────────────────────────────────────
    let state = { tasks: [], sessions: [], pauseSessions: [], activePause: null, lastActiveTaskId: null, notes: [] };
    let pipWindow = null;
    let completedExpanded = false;
    let labelGroupExpanded = {};
    let dragSrcId = null;
    let notesViewExpanded = {};
    let pipNoteTaskId = null;
    let pipExpanded = false;
    let pipLabelFilter = null;
    let pipFilterSignature = null;
    let pipTaskListSignature = null;
    let pendingAudioBlob = null;
    let pendingScreenshotBlob = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let pipPendingAudioBlob = null;
    let pipPendingScreenshotBlob = null;
    let pipMediaRecorder = null;
    let pipAudioChunks = [];

    function persist() {
      Storage.save(state.tasks, state.sessions, state.pauseSessions, state.activePause, state.lastActiveTaskId, state.notes);
    }

    function formatMs(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function parseTargetInput(str) {
      const s = (str || '').trim().toLowerCase();
      if (!s) return null;
      const mMatch = s.match(/^(\d+\.?\d*)m$/);
      if (mMatch) return Math.round(parseFloat(mMatch[1]) * 60000);
      const hMatch = s.match(/^(\d+\.?\d*)h$/);
      if (hMatch) return Math.round(parseFloat(hMatch[1]) * 3600000);
      const numMatch = s.match(/^(\d+\.?\d*)$/);
      if (numMatch) return Math.round(parseFloat(numMatch[1]) * 60000);
      return null;
    }

    function formatTarget(ms) {
      const totalMins = Math.round(ms / 60000);
      if (totalMins < 60) return `${totalMins}m`;
      const h = Math.floor(totalMins / 60);
      const m = totalMins % 60;
      return m === 0 ? `${h}h` : `${h}h${m}m`;
    }

    function getDailyMs(taskId) {
      const midnight = new Date();
      midnight.setHours(0, 0, 0, 0);
      const midnightTs = midnight.getTime();
      const fromSessions = state.sessions
        .filter(s => s.taskId === taskId && s.startedAt >= midnightTs)
        .reduce((acc, s) => acc + s.durationMs, 0);
      const task = state.tasks.find(t => t.id === taskId);
      const liveMs = task?.activeTimer
        ? Math.max(0, Date.now() - Math.max(task.activeTimer.startTimestamp, midnightTs))
        : 0;
      return fromSessions + liveMs;
    }

    // ── Pause Manager ─────────────────────────────────────────────────────────
    const PauseManager = (() => {
      function start() {
        if (state.activePause) return;
        state.activePause = { startTimestamp: Date.now(), lastNotifiedMin: 0 };
        persist();
      }

      function stop() {
        if (!state.activePause) return;
        const durationMs = Date.now() - state.activePause.startTimestamp;
        state.pauseSessions.push({
          startedAt: state.activePause.startTimestamp,
          endedAt: Date.now(),
          durationMs
        });
        state.activePause = null;
        persist();
      }

      return { start, stop };
    })();

    // ── Timer ─────────────────────────────────────────────────────────────────
    const Timer = (() => {
      function getLiveMs(task) {
        if (!task.activeTimer) return task.accumulatedMs;
        return task.accumulatedMs + (Date.now() - task.activeTimer.startTimestamp);
      }

      function stopTimer(id) {
        const task = state.tasks.find(t => t.id === id);
        if (!task || !task.activeTimer) return;
        const now = Date.now();
        const durationMs = now - task.activeTimer.startTimestamp;
        task.accumulatedMs += durationMs;
        state.sessions.push({
          taskId: id,
          startedAt: task.activeTimer.startTimestamp,
          endedAt: now,
          durationMs,
        });
        task.activeTimer = null;
        state.lastActiveTaskId = id; 
        persist();
        PauseManager.start(); 
      }

      function stopAll() {
        state.tasks.filter(t => t.activeTimer).forEach(t => stopTimer(t.id));
      }

      function startTimer(id) {
        stopAll();
        PauseManager.stop(); 
        const task = state.tasks.find(t => t.id === id);
        if (!task) return;
        task.activeTimer = { startTimestamp: Date.now() };
        state.lastActiveTaskId = id;
        persist();
      }

      return { getLiveMs, startTimer, stopTimer, stopAll };
    })();

    // ── CRUD ──────────────────────────────────────────────────────────────────
    function addTask(text, priority, dailyTargetMs = null, label = null) {
      const task = {
        id: crypto.randomUUID(),
        text,
        priority,
        completed: false,
        createdAt: Date.now(),
        completedAt: null,
        accumulatedMs: 0,
        activeTimer: null,
        dailyTargetMs,
        label,
      };
      state.tasks.unshift(task);
      persist();
      return task;
    }

    function deleteTask(id) {
      Timer.stopTimer(id);
      state.tasks = state.tasks.filter(t => t.id !== id);
      state.sessions = state.sessions.filter(s => s.taskId !== id);
      state.notes.filter(n => n.taskId === id).forEach(n => {
        if (n.audioId) MediaStore.remove(n.audioId);
        if (n.screenshotId) MediaStore.remove(n.screenshotId);
      });
      state.notes = state.notes.filter(n => n.taskId !== id);
      if (state.lastActiveTaskId === id) state.lastActiveTaskId = null;
      persist();
    }

    function toggleComplete(id) {
      const task = state.tasks.find(t => t.id === id);
      if (!task) return;
      task.completed = !task.completed;
      task.completedAt = task.completed ? Date.now() : null;
      
      if (task.completed && task.activeTimer) {
        Timer.stopTimer(id);
      }
      persist();
    }

    // ── Render: Tasks ─────────────────────────────────────────────────────────
    function taskRowHtml(task, draggable) {
      const liveMs = Timer.getLiveMs(task);
      const isActive = !!task.activeTimer;

      const dailyMs = task.dailyTargetMs ? getDailyMs(task.id) : 0;
      const pct = task.dailyTargetMs
        ? Math.min(dailyMs / task.dailyTargetMs * 100, 100)
        : 0;
      const targetMet = task.dailyTargetMs && dailyMs >= task.dailyTargetMs;

      const fillBarHtml = task.dailyTargetMs
        ? `<div class="fill-bar ${targetMet ? 'complete' : 'filling'}" style="width:${pct.toFixed(2)}%"></div>`
        : '';

      const targetBadgeHtml = task.dailyTargetMs
        ? `<button class="target-badge ${targetMet ? 'met' : 'unmet'}" data-id="${task.id}" data-action="edit-target">⊙ ${formatTarget(task.dailyTargetMs)}</button>`
        : `<button class="target-badge add-target" data-id="${task.id}" data-action="edit-target">⊕</button>`;

      const hasNotes = state.notes.some(n => n.taskId === task.id);
      const notesBtnHtml = `<button class="notes-btn${hasNotes ? ' has-notes' : ''}" data-id="${task.id}" data-action="notes" title="Notes">✎</button>`;

      const labelBadgeHtml = task.label
        ? `<button class="label-badge" data-id="${task.id}" data-action="edit-label" title="${escapeHtml(task.label)}">${escapeHtml(task.label)}</button>`
        : `<button class="label-badge add-label" data-id="${task.id}" data-action="edit-label">+label</button>`;

      return `<div class="task-row${task.completed ? ' completed' : ''}${isActive ? ' active' : ''}" data-id="${task.id}"${draggable ? ' draggable="true"' : ''}>
        ${fillBarHtml}
        <span class="priority-dot priority-${task.priority}"></span>
        <input type="checkbox" class="task-check" data-id="${task.id}"${task.completed ? ' checked' : ''} />
        <span class="task-text">${escapeHtml(task.text)}</span>
        <span class="task-timer${isActive ? ' running' : ''}">${formatMs(liveMs)}</span>
        ${targetBadgeHtml}
        ${labelBadgeHtml}
        ${notesBtnHtml}
        <button class="timer-btn" data-id="${task.id}" data-action="${isActive ? 'stop' : 'start'}">${isActive ? '■' : '▶'}</button>
        <button class="delete-btn" data-id="${task.id}">🗑</button>
      </div>`;
    }

    function renderCompletedSection(completed) {
      const section = document.getElementById('completed-section');
      if (!section) return;
      if (completed.length === 0) { section.innerHTML = ''; return; }
      const chevron = completedExpanded ? '▼' : '▶';
      const rowsHtml = completedExpanded
        ? completed.map(task => taskRowHtml(task, false)).join('')
        : '';
      section.innerHTML = `
        <button class="completed-toggle" id="completed-toggle-btn">
          ${chevron} Completed (${completed.length})
        </button>
        ${rowsHtml}
      `;
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      if (!list) return;

      const incomplete = state.tasks.filter(t => !t.completed);
      const completed  = state.tasks.filter(t => t.completed);

      if (incomplete.length === 0 && completed.length === 0) {
        list.innerHTML = '<p class="empty-state">No tasks yet. Add one above.</p>';
      } else {
        const unlabeled = incomplete.filter(t => !t.label);
        const groups = {};
        incomplete.forEach(t => {
          if (t.label) (groups[t.label] = groups[t.label] || []).push(t);
        });
        const labelNames = Object.keys(groups).sort((a, b) => a.localeCompare(b));

        if (labelNames.length === 0) {
          list.innerHTML = unlabeled.map(task => taskRowHtml(task, true)).join('');
        } else {
          let html = unlabeled.map(task => taskRowHtml(task, true)).join('');
          labelNames.forEach(label => {
            const key = 'label:' + label;
            const expanded = labelGroupExpanded[key] !== false;
            const chevron = expanded ? '▼' : '▶';
            const rowsHtml = expanded
              ? groups[label].map(task => taskRowHtml(task, true)).join('')
              : '';
            html += `
              <button class="label-group-toggle" data-label-key="${escapeHtml(key)}">
                ${chevron} ${escapeHtml(label)} (${groups[label].length})
              </button>
              ${rowsHtml}
            `;
          });
          list.innerHTML = html;
        }
      }

      renderLabelDatalist();
      renderCompletedSection(completed);
      renderTotalTarget();
    }

    function renderLabelDatalist() {
      const dl = document.getElementById('label-datalist');
      if (!dl) return;
      const labels = [...new Set(state.tasks.map(t => t.label).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      dl.innerHTML = labels.map(l => `<option value="${escapeHtml(l)}"></option>`).join('');
    }

    // ── Render: History ───────────────────────────────────────────────────────
    function renderHistory(filter) {
      const container = document.getElementById('history-table');
      if (!container) return;

      const now = Date.now();
      let windowStart;
      if (filter === 'day') {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        windowStart = d.getTime();
      } else if (filter === 'week') {
        windowStart = now - 7 * 24 * 60 * 60 * 1000;
      } else {
        windowStart = now - 30 * 24 * 60 * 60 * 1000;
      }

      const totals = {};
      state.sessions
        .filter(s => s.startedAt >= windowStart)
        .forEach(s => {
          totals[s.taskId] = (totals[s.taskId] || 0) + s.durationMs;
        });

      state.tasks.forEach(t => {
        if (t.activeTimer && t.activeTimer.startTimestamp >= windowStart) {
          const live = Date.now() - t.activeTimer.startTimestamp;
          totals[t.id] = (totals[t.id] || 0) + live;
        }
      });

      let pauseTotal = 0;
      state.pauseSessions
        .filter(p => p.startedAt >= windowStart)
        .forEach(p => { pauseTotal += p.durationMs; });
        
      if (state.activePause && state.activePause.startTimestamp >= windowStart) {
        pauseTotal += (Date.now() - state.activePause.startTimestamp);
      }

      const entries = Object.entries(totals);
      if (entries.length === 0 && pauseTotal === 0) {
        container.innerHTML = '<p class="empty-state">No activity in this period.</p>';
        return;
      }

      let grandTotal = 0;
      const rows = entries.map(([taskId, ms]) => {
        grandTotal += ms;
        const task = state.tasks.find(t => t.id === taskId);
        const name = task ? escapeHtml(task.text) : '(deleted task)';
        return `<tr><td>${name}</td><td>${formatMs(ms)}</td></tr>`;
      }).join('');
      
      const pauseRowHtml = pauseTotal > 0 ? `<tr class="pause-row"><td>⏸ Paused Focus</td><td>${formatMs(pauseTotal)}</td></tr>` : '';

      container.innerHTML = `<table>
        <thead><tr><th>Task</th><th>Total Time</th></tr></thead>
        <tbody>
          ${rows}
          ${pauseRowHtml}
        </tbody>
        <tfoot><tr><td>Total Productive Time</td><td>${formatMs(grandTotal)}</td></tr></tfoot>
      </table>`;
    }

            .pip-note-btn, .pip-check-btn, #pip-expand-btn, #pip-add-btn { display: none; }
          }

          /* Mini: too small for a task list — icon-only play/pause */
          @container (max-width: 110px) {
            #pip-task-list, #pip-scroll-hint, #pip-note-area, #pip-add-area, .time { display: none !important; }
            #pip-header { border-bottom: none; height: 100vh; padding: 0; }
            .pip-btn {
              display: flex; width: 60%; height: 60%; max-width: 44px; max-height: 44px;
              font-size: 1.1rem;
            }
          }
        `;
        pipWindow.document.head.appendChild(style);

        pipWindow.document.body.innerHTML = `
          <div id="pip-scroll">
            <div id="pip-header">
              <div id="pip-fill"></div>
              <div id="pip-liquid">
                <div class="wave wave1"></div>
                <div class="wave wave2"></div>
              </div>
              <div class="time" id="pip-time">00:00:00</div>
              <button class="pip-btn" id="pip-action-btn"></button>
              <button id="pip-add-btn" title="Add task">+</button>
              <button id="pip-expand-btn" title="Expand window">⤢</button>
            </div>
            <div id="pip-filter-row"></div>
            <div id="pip-task-list"></div>
          </div>
          <div id="pip-add-area">
            <input id="pip-add-input" type="text" placeholder="New task…" />
            <div id="pip-add-actions">
              <button class="pip-note-action-btn" id="pip-add-cancel">✕ Cancel</button>
              <button class="pip-note-action-btn save" id="pip-add-save">✓ Add</button>
            </div>
          </div>
          <div id="pip-note-area">
            <div id="pip-note-label">Note for: <span id="pip-note-task-name"></span></div>
            <div id="pip-note-pending"></div>
            <textarea id="pip-note-input" placeholder="Type note…"></textarea>
            <div id="pip-note-actions">
              <button class="pip-note-media-btn" id="pip-note-mic-btn" title="Record audio">🎤</button>
              <button class="pip-note-media-btn" id="pip-note-shot-btn" title="Capture screenshot">🖥</button>
              <button class="pip-note-action-btn" id="pip-note-cancel">✕ Cancel</button>
              <button class="pip-note-action-btn save" id="pip-note-save">✓ Save</button>
            </div>
          </div>
          <div id="pip-scroll-hint">↕ scroll for tasks</div>
        `;

        pipWindow.document.body.addEventListener('click', e => {
          const doc = pipWindow.document;
          const expandBtn     = e.target.closest('#pip-expand-btn');
          const addBtn        = e.target.closest('#pip-add-btn');
          const addSave       = e.target.closest('#pip-add-save');
          const addCancel     = e.target.closest('#pip-add-cancel');
          const pendingRemove = e.target.closest('.pip-note-pending-remove');
          const micBtn        = e.target.closest('#pip-note-mic-btn');
          const shotBtn       = e.target.closest('#pip-note-shot-btn');
          const checkBtn      = e.target.closest('.pip-check-btn');
          const noteBtn       = e.target.closest('.pip-note-btn');
          const noteSave      = e.target.closest('#pip-note-save');
          const noteCancel    = e.target.closest('#pip-note-cancel');
          const taskRow       = e.target.closest('.pip-task');
          const actionBtn     = e.target.closest('#pip-action-btn');

          if (addBtn) {
            pipNoteTaskId = null;
            pipPendingAudioBlob = null;
            pipPendingScreenshotBlob = null;
            renderPipNotePending();
            doc.getElementById('pip-note-area').classList.remove('show');
            doc.getElementById('pip-add-area').classList.add('show');
            doc.getElementById('pip-add-input').value = '';
            doc.getElementById('pip-add-input').focus();
            return;
          }

          if (addSave) {
            const text = doc.getElementById('pip-add-input').value.trim();
            if (text) {
              addTask(text, 'medium', null);
              renderTasks();
            }
            doc.getElementById('pip-add-area').classList.remove('show');
            doc.getElementById('pip-add-input').value = '';
            return;
          }

          if (addCancel) {
            doc.getElementById('pip-add-area').classList.remove('show');
            doc.getElementById('pip-add-input').value = '';
            return;
          }

          if (expandBtn) {
            const anchorX = pipWindow.screenX;
            const anchorY = pipWindow.screenY;
            pipExpanded = !pipExpanded;
            if (pipExpanded) {
              pipWindow.resizeTo(880, 720);
              doc.body.classList.add('pip-big');
              expandBtn.textContent = '⤡';
              expandBtn.title = 'Collapse window';
            } else {
              pipWindow.resizeTo(220, 180);
              doc.body.classList.remove('pip-big');
              expandBtn.textContent = '⤢';
              expandBtn.title = 'Expand window';
            }
            pipWindow.moveTo(anchorX, anchorY);
            return;
          }

          if (pendingRemove) {
            if (pendingRemove.dataset.remove === 'audio') pipPendingAudioBlob = null;
            else pipPendingScreenshotBlob = null;
            renderPipNotePending();
            return;
          }

          if (micBtn) {
            if (pipMediaRecorder && pipMediaRecorder.state === 'recording') {
              pipMediaRecorder.stop();
              return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
              pipAudioChunks = [];
              pipMediaRecorder = new MediaRecorder(stream);
              pipMediaRecorder.ondataavailable = ev => pipAudioChunks.push(ev.data);
              pipMediaRecorder.onstop = () => {
                pipPendingAudioBlob = new Blob(pipAudioChunks, { type: 'audio/webm' });
                stream.getTracks().forEach(t => t.stop());
                micBtn.classList.remove('recording');
                micBtn.textContent = '🎤';
                renderPipNotePending();
              };
              pipMediaRecorder.start();
              micBtn.classList.add('recording');
              micBtn.textContent = '⏹';
            }).catch(err => {
              console.error('Mic error:', err);
              alert('Could not access microphone.');
            });
            return;
          }

          if (shotBtn) {
            navigator.mediaDevices.getDisplayMedia({ video: true }).then(async stream => {
              const video = doc.createElement('video');
              video.muted = true;
              video.srcObject = stream;
              await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
              await new Promise(r => setTimeout(r, 150));
              const canvas = doc.createElement('canvas');
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
              canvas.getContext('2d').drawImage(video, 0, 0);
              stream.getTracks().forEach(t => t.stop());
              canvas.toBlob(blob => {
                pipPendingScreenshotBlob = blob;
                renderPipNotePending();
              }, 'image/png');
            }).catch(err => {
              console.error('Screenshot error:', err);
              if (err.name !== 'NotAllowedError') alert('Could not capture screen.');
            });
            return;
          }

          if (noteSave) {
            const text = doc.getElementById('pip-note-input').value.trim();
            if (pipNoteTaskId && (text || pipPendingAudioBlob || pipPendingScreenshotBlob)) {
              const note = { id: crypto.randomUUID(), taskId: pipNoteTaskId, text, createdAt: Date.now(), audioId: null, screenshotId: null };
              const puts = [];
              if (pipPendingAudioBlob) { note.audioId = crypto.randomUUID(); puts.push(MediaStore.put(note.audioId, pipPendingAudioBlob)); }
              if (pipPendingScreenshotBlob) { note.screenshotId = crypto.randomUUID(); puts.push(MediaStore.put(note.screenshotId, pipPendingScreenshotBlob)); }
              Promise.all(puts).then(() => {
                state.notes.push(note);
                persist();
                renderTasks();
              });
            }
            pipNoteTaskId = null;
            pipPendingAudioBlob = null;
            pipPendingScreenshotBlob = null;
            renderPipNotePending();
            doc.getElementById('pip-note-area').classList.remove('show');
            doc.getElementById('pip-note-input').value = '';
            return;
          }

          if (noteCancel) {
            pipNoteTaskId = null;
            pipPendingAudioBlob = null;
            pipPendingScreenshotBlob = null;
            renderPipNotePending();
            doc.getElementById('pip-note-area').classList.remove('show');
            doc.getElementById('pip-note-input').value = '';
            return;
          }

          if (checkBtn) {
            toggleComplete(checkBtn.dataset.id);
            tick();
            renderTasks();
            return;
          }

          if (noteBtn) {
            const id = noteBtn.dataset.id;
            const task = state.tasks.find(t => t.id === id);
            pipNoteTaskId = id;
            pipPendingAudioBlob = null;
            pipPendingScreenshotBlob = null;
            renderPipNotePending();
            doc.getElementById('pip-add-area').classList.remove('show');
            doc.getElementById('pip-note-task-name').textContent = task ? task.text.substring(0, 22) : '';
            doc.getElementById('pip-note-input').value = '';
            doc.getElementById('pip-note-area').classList.add('show');
            doc.getElementById('pip-note-input').focus();
            return;
          }

          if (actionBtn) {
            const activeTask = state.tasks.find(t => t.activeTimer);
            if (activeTask) {
              Timer.stopTimer(activeTask.id);
            } else if (state.activePause) {
              let targetId = state.lastActiveTaskId;
              if (!targetId || !state.tasks.find(t => t.id === targetId && !t.completed)) {
                const fallback = state.tasks.find(t => !t.completed);
                if (fallback) targetId = fallback.id;
              }
              if (targetId) Timer.startTimer(targetId);
            }
            tick();
            renderTasks();
            return;
          }

          if (taskRow) {
            const id = taskRow.dataset.id;
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            if (task.activeTimer) Timer.stopTimer(id);
            else Timer.startTimer(id);
            tick();
            renderTasks();
          }
        });

        pipWindow.document.body.addEventListener('keydown', e => {
          const doc = pipWindow.document;
          if (e.target.id === 'pip-add-input') {
            if (e.key === 'Enter') doc.getElementById('pip-add-save').click();
            if (e.key === 'Escape') doc.getElementById('pip-add-cancel').click();
          } else if (e.target.id === 'pip-note-input' && e.key === 'Escape') {
            doc.getElementById('pip-note-cancel').click();
          }
        });

        pipWindow.document.body.addEventListener('change', e => {
          if (e.target.id === 'pip-label-filter') {
            pipLabelFilter = e.target.value || null;
            updatePip();
          }
        });

        pipWindow.addEventListener('pagehide', () => {
          pipWindow = null; pipExpanded = false; pipNoteTaskId = null;
          pipPendingAudioBlob = null; pipPendingScreenshotBlob = null; pipLabelFilter = null;
          pipFilterSignature = null; pipTaskListSignature = null;
        });
        updatePip();

      } catch (err) {
        console.error("Failed to open PiP window:", err);
      }
    }

    function updatePip() {
      if (!pipWindow) return;
      const doc = pipWindow.document;
      const timeEl     = doc.getElementById('pip-time');
      const btnEl      = doc.getElementById('pip-action-btn');
      const fillEl     = doc.getElementById('pip-fill');
      const liquidEl   = doc.getElementById('pip-liquid');
      const listEl     = doc.getElementById('pip-task-list');
      const filterEl   = doc.getElementById('pip-filter-row');
      const scrollEl   = doc.getElementById('pip-scroll');
      const bodyEl     = doc.body;

      const activeTask = state.tasks.find(t => t.activeTimer);
      const PRIORITY_COLOR = { high: '#f87171', medium: '#fb923c', low: '#60a5fa' };

      const setLiquidLevel = task => {
        if (!liquidEl) return;
        const pct = task && task.dailyTargetMs
          ? Math.min(getDailyMs(task.id) / task.dailyTargetMs * 100, 100)
          : 45;
        liquidEl.querySelectorAll('.wave').forEach(w => { w.style.top = (100 - pct) + '%'; });
      };

      // ── Header ────────────────────────────────────────────────────────────────
      if (activeTask) {
        timeEl.textContent = formatMs(Timer.getLiveMs(activeTask));
        bodyEl.classList.remove('paused');
        bodyEl.classList.add('pip-running');
        btnEl.className = 'pip-btn show stop';
        btnEl.innerHTML = '■';
        setLiquidLevel(activeTask);
        if (fillEl && activeTask.dailyTargetMs) {
          const pct = Math.min(getDailyMs(activeTask.id) / activeTask.dailyTargetMs * 100, 100);
          fillEl.style.width = pct.toFixed(2) + '%';
          fillEl.className = pct >= 100 ? 'complete' : '';
        } else if (fillEl) {
          fillEl.style.width = '0%'; fillEl.className = '';
        }
      } else if (state.activePause) {
        timeEl.textContent = formatMs(Date.now() - state.activePause.startTimestamp);
        bodyEl.classList.add('paused');
        bodyEl.classList.remove('pip-running');
        setLiquidLevel(null);
        if (fillEl) { fillEl.style.width = '0%'; fillEl.className = ''; }
        btnEl.className = state.tasks.some(t => !t.completed) ? 'pip-btn show start' : 'pip-btn';
        btnEl.innerHTML = '▶';
      } else {
        timeEl.textContent = '00:00:00';
        bodyEl.classList.remove('paused');
        bodyEl.classList.remove('pip-running');
        btnEl.className = 'pip-btn';
        if (fillEl) { fillEl.style.width = '0%'; fillEl.className = ''; }
      }

      // ── Label filter ──────────────────────────────────────────────────────────
      const allIncomplete = state.tasks.filter(t => !t.completed);
      if (filterEl) {
        const distinctLabels = [...new Set(allIncomplete.map(t => t.label).filter(Boolean))].sort((a, b) => a.localeCompare(b));
        const hasUnlabeled = allIncomplete.some(t => !t.label);
        const filterSig = distinctLabels.join('|') + '::' + hasUnlabeled;

        if (distinctLabels.length === 0) {
          pipLabelFilter = null;
          if (pipFilterSignature !== filterSig) {
            filterEl.innerHTML = '';
            pipFilterSignature = filterSig;
          }
        } else if (pipFilterSignature !== filterSig) {
          filterEl.innerHTML = `<select id="pip-label-filter">
            <option value="">All labels</option>
            ${hasUnlabeled ? `<option value="__none__">No label</option>` : ''}
            ${distinctLabels.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('')}
          </select>`;
          filterEl.querySelector('select').value = pipLabelFilter || '';
          pipFilterSignature = filterSig;
        } else {
          const sel = filterEl.querySelector('select');
          if (sel && sel.value !== (pipLabelFilter || '') && doc.activeElement !== sel) {
            sel.value = pipLabelFilter || '';
          }
        }
      }

      // ── Task list ─────────────────────────────────────────────────────────────
      if (listEl) {
        let incomplete = allIncomplete;
        if (pipLabelFilter === '__none__') incomplete = allIncomplete.filter(t => !t.label);
        else if (pipLabelFilter) incomplete = allIncomplete.filter(t => t.label === pipLabelFilter);

        const listSig = incomplete.map(t => `${t.id}:${t.label || ''}:${t.priority}:${t.activeTimer ? 1 : 0}`).join(',');
        if (listSig !== pipTaskListSignature) {
          const scroll = scrollEl ? scrollEl.scrollTop : 0;
          listEl.innerHTML = incomplete.map(task => {
            const isActive = !!task.activeTimer;
            const dotColor = PRIORITY_COLOR[task.priority] || '#666';
            return `<div class="pip-task${isActive ? ' pip-active' : ''}" data-id="${task.id}">
              <span class="pip-task-dot" style="background:${dotColor}"></span>
              <button class="pip-check-btn" data-id="${task.id}" title="Mark complete"></button>
              <span class="pip-task-name">${escapeHtml(task.text)}</span>
              <button class="pip-note-btn" data-id="${task.id}" title="Add note">✎</button>
              <button class="pip-task-btn" data-id="${task.id}">${isActive ? '■' : '▶'}</button>
            </div>`;
          }).join('');
          if (scrollEl) scrollEl.scrollTop = scroll;
          pipTaskListSignature = listSig;
        }
      }
    }

    function renderTotalTarget() {
      const bar = document.getElementById('total-target-bar');
      if (!bar) return;
      const tasksWithTargets = state.tasks.filter(t => t.dailyTargetMs && !t.completed);
      if (tasksWithTargets.length === 0) {
        bar.classList.add('hidden');
        return;
      }
      const totalTargetMs = tasksWithTargets.reduce((acc, t) => acc + t.dailyTargetMs, 0);
      const totalDailyMs = tasksWithTargets.reduce((acc, t) => acc + getDailyMs(t.id), 0);
      const pct = Math.min(totalDailyMs / totalTargetMs * 100, 100);
      bar.classList.remove('hidden');
      bar.classList.toggle('complete', totalDailyMs >= totalTargetMs);
      bar.querySelector('.ttb-fill').style.width = pct.toFixed(2) + '%';
      document.getElementById('ttb-label').textContent =
        `Today: ${formatTarget(Math.round(totalDailyMs))} / ${formatTarget(totalTargetMs)}`;
    }

    function reorderTask(srcId, targetId) {
      if (srcId === targetId) return;
      const srcIdx = state.tasks.findIndex(t => t.id === srcId);
      const tgtIdx = state.tasks.findIndex(t => t.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;
      if ((state.tasks[srcIdx].label || null) !== (state.tasks[tgtIdx].label || null)) return;
      const [task] = state.tasks.splice(srcIdx, 1);
      state.tasks.splice(tgtIdx, 0, task);
      persist();
    }

    function openTargetEdit(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      const badge = document.querySelector(`[data-id="${taskId}"][data-action="edit-target"]`);
      if (!badge) return;
      const currentVal = task.dailyTargetMs ? formatTarget(task.dailyTargetMs) : '';
      const input = document.createElement('input');
      input.className = 'target-edit-input';
      input.value = currentVal;
      input.placeholder = '30m, 1h…';
      badge.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      function save() {
        if (saved) return;
        saved = true;
        task.dailyTargetMs = parseTargetInput(input.value);
        persist();
        renderTasks();
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', save);
    }

    function openLabelEdit(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      const badge = document.querySelector(`[data-id="${taskId}"][data-action="edit-label"]`);
      if (!badge) return;
      const currentVal = task.label || '';
      const input = document.createElement('input');
      input.className = 'label-edit-input';
      input.value = currentVal;
      input.placeholder = 'Label…';
      input.setAttribute('list', 'label-datalist');
      badge.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      function save() {
        if (saved) return;
        saved = true;
        const val = input.value.trim();
        task.label = val || null;
        persist();
        renderTasks();
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', save);
    }

    // ── Notes ─────────────────────────────────────────────────────────────────
    function hydrateMedia(container) {
      container.querySelectorAll('[data-audio-id]').forEach(el => {
        const id = el.dataset.audioId;
        if (!id) return;
        MediaStore.get(id).then(blob => {
          if (!blob) return;
          el.innerHTML = `<audio controls src="${URL.createObjectURL(blob)}"></audio>`;
        });
      });
      container.querySelectorAll('[data-screenshot-id]').forEach(el => {
        const id = el.dataset.screenshotId;
        if (!id) return;
        MediaStore.get(id).then(blob => {
          if (!blob) return;
          el.src = URL.createObjectURL(blob);
        });
      });
    }

    function noteMediaHtml(note) {
      let html = '';
      if (note.audioId) html += `<div class="note-audio" data-audio-id="${note.audioId}"></div>`;
      if (note.screenshotId) html += `<img class="note-shot" data-screenshot-id="${note.screenshotId}" />`;
      return html;
    }

    function resetPendingMedia() {
      pendingAudioBlob = null;
      pendingScreenshotBlob = null;
      renderPendingPreview();
    }

    function renderPendingPreview() {
      const el = document.getElementById('notes-pending-preview');
      let html = '';
      if (pendingAudioBlob) {
        html += `<div class="notes-pending-item"><span>🎤 audio recorded</span><button class="notes-pending-remove" data-remove="audio">✕ remove</button></div>`;
      }
      if (pendingScreenshotBlob) {
        html += `<div class="notes-pending-item"><img src="${URL.createObjectURL(pendingScreenshotBlob)}" /><button class="notes-pending-remove" data-remove="screenshot">✕ remove</button></div>`;
      }
      el.innerHTML = html;
    }

    function renderPipNotePending() {
      if (!pipWindow) return;
      const el = pipWindow.document.getElementById('pip-note-pending');
      if (!el) return;
      let html = '';
      if (pipPendingAudioBlob) {
        html += `<div class="pip-note-pending-item"><span>🎤 recorded</span><button class="pip-note-pending-remove" data-remove="audio">✕</button></div>`;
      }
      if (pipPendingScreenshotBlob) {
        html += `<div class="pip-note-pending-item"><img src="${URL.createObjectURL(pipPendingScreenshotBlob)}" /><button class="pip-note-pending-remove" data-remove="screenshot">✕</button></div>`;
      }
      el.innerHTML = html;
    }

    function openNotesModal(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      const modal = document.getElementById('notes-modal');
      modal.dataset.taskId = taskId;
      document.getElementById('notes-modal-title').textContent = task.text;
      modal.classList.remove('hidden');
      renderModalNotes(taskId);
      resetPendingMedia();
      const ta = document.getElementById('notes-textarea');
      ta.value = '';
      ta.focus();
    }

    function renderModalNotes(taskId) {
      const list = document.getElementById('notes-list');
      const notes = state.notes
        .filter(n => n.taskId === taskId)
        .sort((a, b) => b.createdAt - a.createdAt);
      if (notes.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);font-size:0.875rem;text-align:center;padding:20px 0">No notes yet.</p>';
        return;
      }
      list.innerHTML = notes.map(note => `
        <div class="note-item">
          <div class="note-item-meta">${new Date(note.createdAt).toLocaleString()}</div>
          ${note.text ? `<div class="note-item-text">${escapeHtml(note.text)}</div>` : ''}
          ${noteMediaHtml(note)}
          <button class="note-item-delete" data-note-id="${note.id}">✕</button>
        </div>
      `).join('');
      hydrateMedia(list);
    }

    function renderNotes() {
      const container = document.getElementById('notes-view-content');
      if (!container) return;
      const taskIdsWithNotes = [...new Set(state.notes.map(n => n.taskId))];
      if (taskIdsWithNotes.length === 0) {
        container.innerHTML = '<p class="empty-state">No notes yet. Use the ✎ button on any task to add notes.</p>';
        return;
      }
      const sections = taskIdsWithNotes
        .map(id => {
          const task = state.tasks.find(t => t.id === id);
          const notes = state.notes.filter(n => n.taskId === id).sort((a, b) => b.createdAt - a.createdAt);
          return { id, task, notes, lastNote: notes[0]?.createdAt || 0 };
        })
        .sort((a, b) => b.lastNote - a.lastNote);

      container.innerHTML = sections.map(({ id, task, notes }) => {
        const taskName = task ? escapeHtml(task.text) : '(deleted task)';
        const dotColor = !task ? 'var(--high)' : task.completed ? 'var(--muted)' : 'var(--accent)';
        const expanded = notesViewExpanded[id] !== false;
        const chevron = expanded ? '▼' : '▶';
        const bodyHtml = expanded ? `
          <div class="notes-task-body">
            ${notes.map(note => `
              <div class="notes-view-item">
                <div class="notes-view-meta">${new Date(note.createdAt).toLocaleString()}</div>
                ${note.text ? `<div class="notes-view-text">${escapeHtml(note.text)}</div>` : ''}
                ${noteMediaHtml(note)}
              </div>`).join('')}
          </div>` : '';
        return `<div class="notes-task-section">
          <button class="notes-task-toggle" data-task-id="${id}">
            <span class="toggle-chevron">${chevron}</span>
            <span style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
            <span class="toggle-name">${taskName}</span>
            <span class="toggle-count">${notes.length} note${notes.length !== 1 ? 's' : ''}</span>
          </button>
          ${bodyHtml}
        </div>`;
      }).join('');
      hydrateMedia(container);
    }

    // ── Events + Init ─────────────────────────────────────────────────────────
    let currentView = 'tasks';
    let currentHistoryFilter = 'day';

    function showView(view) {
      currentView = view;
      document.getElementById('view-tasks').classList.toggle('hidden', view !== 'tasks');
      document.getElementById('view-history').classList.toggle('hidden', view !== 'history');
      document.getElementById('view-notes').classList.toggle('hidden', view !== 'notes');
      document.getElementById('nav-tasks').classList.toggle('active', view === 'tasks');
      document.getElementById('nav-history').classList.toggle('active', view === 'history');
      document.getElementById('nav-notes').classList.toggle('active', view === 'notes');
      if (view === 'tasks') renderTasks();
      else if (view === 'history') renderHistory(currentHistoryFilter);
      else renderNotes();
    }

    function tick() {
      const activeTask = state.tasks.find(t => t.activeTimer);
      const pauseBanner = document.getElementById('pause-banner');
      
      updatePip();

      if (activeTask) {
         const liveMs = Timer.getLiveMs(activeTask);
         document.title = `[${formatMs(liveMs)}] ${activeTask.text} - TaskFlow`;
         pauseBanner.classList.add('hidden');
      } else if (state.activePause) {
         const liveMs = Date.now() - state.activePause.startTimestamp;
         document.title = `[Paused: ${formatMs(liveMs)}] - TaskFlow`;
         pauseBanner.classList.remove('hidden');
         document.getElementById('pause-timer').textContent = formatMs(liveMs);
         
         const minutes = Math.floor(liveMs / 60000);
         const tenMinInterval = Math.floor(minutes / 10);
         
         if (tenMinInterval > 0 && tenMinInterval > state.activePause.lastNotifiedMin) {
           state.activePause.lastNotifiedMin = tenMinInterval;
           persist();
           if (Notification.permission === 'granted') {
             new Notification('TaskFlow', { 
               body: `You have been paused for ${tenMinInterval * 10} minutes. Time to get back to focus?` 
             });
           }
         }
      } else {
         document.title = 'TaskFlow';
         pauseBanner.classList.add('hidden');
      }

      if (currentView === 'tasks' && activeTask) {
        renderTasks();
      } else if (currentView === 'history') {
        renderHistory(currentHistoryFilter);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }

      const loaded = Storage.load();
      state.tasks = loaded.tasks;
      state.sessions = loaded.sessions;
      state.pauseSessions = loaded.pauseSessions || [];
      state.activePause = loaded.activePause || null;
      state.lastActiveTaskId = loaded.lastActiveTaskId || null;
      state.notes = loaded.notes || [];
      completedExpanded = localStorage.getItem('tf_completed_expanded') === 'true';

      document.getElementById('pip-btn').addEventListener('click', initPip);

      document.getElementById('add-btn').addEventListener('click', () => {
        const input = document.getElementById('task-input');
        const priority = document.getElementById('priority-select').value;
        const targetInput = document.getElementById('target-input');
        const labelInput = document.getElementById('label-input');
        const text = input.value.trim();
        if (!text) return;
        const dailyTargetMs = parseTargetInput(targetInput.value);
        const label = labelInput.value.trim() || null;
        addTask(text, priority, dailyTargetMs, label);
        input.value = '';
        targetInput.value = '';
        labelInput.value = '';
        renderTasks();
      });

      document.getElementById('task-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('add-btn').click();
      });

      document.getElementById('task-list').addEventListener('click', e => {
        const groupToggle = e.target.closest('.label-group-toggle');
        if (groupToggle) {
          const key = groupToggle.dataset.labelKey;
          labelGroupExpanded[key] = labelGroupExpanded[key] === false ? true : false;
          renderTasks();
          return;
        }
        const id = e.target.dataset.id;
        if (!id) return;
        if (e.target.classList.contains('task-check')) {
          toggleComplete(id);
          renderTasks();
        } else if (e.target.classList.contains('timer-btn')) {
          if (e.target.dataset.action === 'start') Timer.startTimer(id);
          else Timer.stopTimer(id);
          renderTasks();
        } else if (e.target.classList.contains('delete-btn')) {
          deleteTask(id);
          renderTasks();
        } else if (e.target.dataset.action === 'edit-target') {
          openTargetEdit(id);
        } else if (e.target.dataset.action === 'edit-label') {
          openLabelEdit(id);
        } else if (e.target.dataset.action === 'notes') {
          openNotesModal(id);
        }
      });

      document.getElementById('completed-section').addEventListener('click', e => {
        const btn = e.target.closest('#completed-toggle-btn');
        if (btn) {
          completedExpanded = !completedExpanded;
          localStorage.setItem('tf_completed_expanded', String(completedExpanded));
          renderTasks();
          return;
        }
        const id = e.target.dataset.id;
        if (!id) return;
        if (e.target.classList.contains('task-check')) {
          toggleComplete(id);
          renderTasks();
        } else if (e.target.classList.contains('timer-btn')) {
          if (e.target.dataset.action === 'start') Timer.startTimer(id);
          else Timer.stopTimer(id);
          renderTasks();
        } else if (e.target.classList.contains('delete-btn')) {
          deleteTask(id);
          renderTasks();
        } else if (e.target.dataset.action === 'edit-target') {
          openTargetEdit(id);
        } else if (e.target.dataset.action === 'edit-label') {
          openLabelEdit(id);
        } else if (e.target.dataset.action === 'notes') {
          openNotesModal(id);
        }
      });

      const taskList = document.getElementById('task-list');

      taskList.addEventListener('dragstart', e => {
        const row = e.target.closest('.task-row');
        if (!row) return;
        dragSrcId = row.dataset.id;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      taskList.addEventListener('dragover', e => {
        e.preventDefault();
        const row = e.target.closest('.task-row');
        if (!row || row.dataset.id === dragSrcId) return;
        document.querySelectorAll('.task-row.drag-over').forEach(r => r.classList.remove('drag-over'));
        row.classList.add('drag-over');
      });

      taskList.addEventListener('dragleave', e => {
        const row = e.target.closest('.task-row');
        if (row) row.classList.remove('drag-over');
      });

      taskList.addEventListener('drop', e => {
        e.preventDefault();
        const row = e.target.closest('.task-row');
        if (!row || !dragSrcId) return;
        reorderTask(dragSrcId, row.dataset.id);
        dragSrcId = null;
        renderTasks();
      });

      taskList.addEventListener('dragend', () => {
        dragSrcId = null;
        document.querySelectorAll('.task-row.dragging, .task-row.drag-over')
          .forEach(r => r.classList.remove('dragging', 'drag-over'));
      });

      document.getElementById('nav-tasks').addEventListener('click', () => showView('tasks'));
      document.getElementById('nav-history').addEventListener('click', () => showView('history'));
      document.getElementById('nav-notes').addEventListener('click', () => showView('notes'));

      // Notes modal events
      document.getElementById('notes-modal-close').addEventListener('click', () => {
        document.getElementById('notes-modal').classList.add('hidden');
      });
      document.getElementById('notes-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('notes-modal'))
          document.getElementById('notes-modal').classList.add('hidden');
      });
      document.getElementById('notes-save-btn').addEventListener('click', async () => {
        const ta = document.getElementById('notes-textarea');
        const text = ta.value.trim();
        const taskId = document.getElementById('notes-modal').dataset.taskId;
        if (!taskId || (!text && !pendingAudioBlob && !pendingScreenshotBlob)) return;
        const note = { id: crypto.randomUUID(), taskId, text, createdAt: Date.now(), audioId: null, screenshotId: null };
        if (pendingAudioBlob) {
          note.audioId = crypto.randomUUID();
          await MediaStore.put(note.audioId, pendingAudioBlob);
        }
        if (pendingScreenshotBlob) {
          note.screenshotId = crypto.randomUUID();
          await MediaStore.put(note.screenshotId, pendingScreenshotBlob);
        }
        state.notes.push(note);
        persist();
        ta.value = '';
        resetPendingMedia();
        renderModalNotes(taskId);
        renderTasks();
      });
      document.getElementById('notes-textarea').addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey))
          document.getElementById('notes-save-btn').click();
      });
      document.getElementById('notes-list').addEventListener('click', e => {
        const del = e.target.closest('.note-item-delete');
        if (!del) return;
        const note = state.notes.find(n => n.id === del.dataset.noteId);
        if (note) {
          if (note.audioId) MediaStore.remove(note.audioId);
          if (note.screenshotId) MediaStore.remove(note.screenshotId);
        }
        state.notes = state.notes.filter(n => n.id !== del.dataset.noteId);
        persist();
        renderModalNotes(document.getElementById('notes-modal').dataset.taskId);
        renderTasks();
      });
      document.getElementById('notes-pending-preview').addEventListener('click', e => {
        const btn = e.target.closest('.notes-pending-remove');
        if (!btn) return;
        if (btn.dataset.remove === 'audio') pendingAudioBlob = null;
        else pendingScreenshotBlob = null;
        renderPendingPreview();
      });
      document.getElementById('notes-mic-btn').addEventListener('click', async () => {
        const btn = document.getElementById('notes-mic-btn');
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            pendingAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            stream.getTracks().forEach(t => t.stop());
            btn.classList.remove('recording');
            btn.textContent = '🎤';
            renderPendingPreview();
          };
          mediaRecorder.start();
          btn.classList.add('recording');
          btn.textContent = '⏹';
        } catch (err) {
          console.error('Mic error:', err);
          alert('Could not access microphone.');
        }
      });
      document.getElementById('notes-shot-btn').addEventListener('click', async () => {
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          const video = document.createElement('video');
          video.muted = true;
          video.srcObject = stream;
          await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
          await new Promise(r => setTimeout(r, 150));
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          stream.getTracks().forEach(t => t.stop());
          canvas.toBlob(blob => {
            pendingScreenshotBlob = blob;
            renderPendingPreview();
          }, 'image/png');
        } catch (err) {
          console.error('Screenshot error:', err);
          if (err.name !== 'NotAllowedError') alert('Could not capture screen.');
        }
      });

      // Notes view toggle
      document.getElementById('notes-view-content').addEventListener('click', e => {
        const toggle = e.target.closest('.notes-task-toggle');
        if (!toggle) return;
        const id = toggle.dataset.taskId;
        notesViewExpanded[id] = notesViewExpanded[id] === false ? true : false;
        renderNotes();
      });

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentHistoryFilter = btn.dataset.filter;
          renderHistory(currentHistoryFilter);
        });
      });

      setInterval(tick, 1000);
      renderTasks();
    });
  </script>
</body>
</html>
